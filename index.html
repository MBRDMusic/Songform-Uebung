<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Song Form – Merkmale zuordnen</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
  body { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; overflow-x: hidden; }

  .header { padding: 10px 12px 6px; text-align: center; position: sticky; top: 0; background: #0f172a; z-index: 40; border-bottom: 1px solid #1e293b; }
  .header h1 { font-size: 1.2em; color: #fff; margin-bottom: 2px; }
  .header .sub { font-size: 0.75em; color: #94a3b8; }
  .score { font-size: 0.9em; font-weight: 700; min-height: 1.2em; margin-top: 2px; }
  .score.good { color: #10b981; }
  .score.partial { color: #f59e0b; }
  .score.bad { color: #e94560; }

  .content { padding: 8px; padding-bottom: 70px; }

  /* Pool */
  .pool-label { font-size: 0.7em; color: #64748b; text-align: center; margin-bottom: 4px; }
  .card-pool { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; padding: 8px; background: #1e293b; border-radius: 10px; border: 2px dashed #475569; margin-bottom: 8px; min-height: 40px; }

  /* Zones grid */
  .zones { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .zone { background: #1e293b; border-radius: 10px; border: 2px solid #334155; padding: 6px; min-height: 80px; transition: border-color 0.2s, background 0.2s; }
  .zone.highlight { border-color: #3b82f6; background: #1e3a5f; }
  .zone-title { font-weight: 700; font-size: 0.8em; text-align: center; padding: 2px 0 4px; margin-bottom: 4px; }
  .zone-items { display: flex; flex-wrap: wrap; gap: 4px; min-height: 20px; }

  /* Zone colors */
  .z-intro .zone-title { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
  .z-verse .zone-title { color: #10b981; border-bottom: 2px solid #10b981; }
  .z-prechorus .zone-title { color: #8b5cf6; border-bottom: 2px solid #8b5cf6; }
  .z-chorus .zone-title { color: #e94560; border-bottom: 2px solid #e94560; }
  .z-bridge .zone-title { color: #f59e0b; border-bottom: 2px solid #f59e0b; }
  .z-solo .zone-title { color: #ec4899; border-bottom: 2px solid #ec4899; }
  .z-outro .zone-title { color: #6366f1; border-bottom: 2px solid #6366f1; }
  .z-interlude .zone-title { color: #14b8a6; border-bottom: 2px solid #14b8a6; }

  /* Cards */
  .card { background: #334155; color: #e2e8f0; padding: 5px 9px; border-radius: 6px; font-size: 0.7em; font-weight: 500; cursor: grab; touch-action: none; transition: transform 0.1s, box-shadow 0.1s; white-space: nowrap; }
  .card.correct { background: #065f46; color: #a7f3d0; }
  .card.incorrect { background: #7f1d1d; color: #fca5a5; }

  /* Drag ghost */
  .drag-ghost { position: fixed; z-index: 9999; pointer-events: none; transform: scale(1.1); box-shadow: 0 8px 24px rgba(0,0,0,0.5); }

  /* Buttons */
  .btn-row { display: flex; gap: 8px; justify-content: center; position: fixed; bottom: 0; left: 0; right: 0; padding: 10px 12px; background: #0f172a; border-top: 1px solid #1e293b; z-index: 50; }
  .btn { padding: 12px 24px; border: none; border-radius: 10px; font-size: 0.9em; font-weight: 700; cursor: pointer; }
  .btn:active { transform: scale(0.96); }
  .btn-check { background: #3b82f6; color: #fff; }
  .btn-reset { background: #475569; color: #e2e8f0; }

  @media (min-width: 768px) {
    .zones { grid-template-columns: repeat(4, 1fr); }
    .card { font-size: 0.75em; }
    .zone { min-height: 100px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🎵 Formteile & Merkmale</h1>
  <div class="sub">Halte ein Kärtchen gedrückt und ziehe es in das passende Feld</div>
  <div class="score" id="score"></div>
</div>

<div class="content">
  <div class="pool-label">Merkmale zum Zuordnen:</div>
  <div class="card-pool" id="pool"></div>
  <div class="zones" id="zones"></div>
</div>

<div class="btn-row">
  <button class="btn btn-check" onclick="checkAnswers()">✓ Überprüfen</button>
  <button class="btn btn-reset" onclick="resetAll()">↺ Neu starten</button>
</div>

<script>
const formteile = [
  { id: 'intro', name: 'Intro', css: 'z-intro' },
  { id: 'verse', name: 'Verse', css: 'z-verse' },
  { id: 'prechorus', name: 'Pre-Chorus', css: 'z-prechorus' },
  { id: 'chorus', name: 'Chorus', css: 'z-chorus' },
  { id: 'bridge', name: 'Bridge', css: 'z-bridge' },
  { id: 'solo', name: 'Solo', css: 'z-solo' },
  { id: 'outro', name: 'Outro', css: 'z-outro' },
  { id: 'interlude', name: 'Interlude', css: 'z-interlude' },
];

const merkmale = [
  { text: 'Eröffnet den Song', answer: 'intro' },
  { text: 'Macht neugierig', answer: 'intro' },
  { text: 'Stellt das Riff/Thema vor', answer: 'intro' },
  { text: 'Text ändert sich', answer: 'verse' },
  { text: 'Erzählt die Geschichte', answer: 'verse' },
  { text: 'Melodie bleibt gleich', answer: 'verse' },
  { text: 'Überleitung zum Refrain', answer: 'prechorus' },
  { text: '„Jetzt kommt der Chorus!"', answer: 'prechorus' },
  { text: 'Steigert die Erwartung', answer: 'prechorus' },
  { text: 'Eingängigste Melodie', answer: 'chorus' },
  { text: 'Enthält den Songtitel', answer: 'chorus' },
  { text: 'Höhepunkt des Songs', answer: 'chorus' },
  { text: 'Text wiederholt sich', answer: 'chorus' },
  { text: 'Kommt nur einmal vor', answer: 'bridge' },
  { text: 'Neue Melodie + Harmonien', answer: 'bridge' },
  { text: 'Bricht das Muster auf', answer: 'bridge' },
  { text: 'Ein Instrument glänzt', answer: 'solo' },
  { text: 'Immer ohne Gesang', answer: 'solo' },
  { text: 'Zeigt Virtuosität', answer: 'solo' },
  { text: 'Song klingt aus', answer: 'outro' },
  { text: 'Fade-Out möglich', answer: 'outro' },
  { text: 'Letzter Eindruck', answer: 'outro' },
  { text: 'Verbindet zwei Teile', answer: 'interlude' },
  { text: 'Intro-Riff kehrt zurück', answer: 'interlude' },
  { text: 'Atempause zwischen Teilen', answer: 'interlude' },
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const poolEl = document.getElementById('pool');
const zonesEl = document.getElementById('zones');

function buildUI() {
  poolEl.innerHTML = '';
  zonesEl.innerHTML = '';
  document.getElementById('score').textContent = '';
  document.getElementById('score').className = 'score';

  shuffle(merkmale).forEach((m, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.textContent = m.text;
    card.dataset.answer = m.answer;
    card.dataset.id = 'card-' + i;
    poolEl.appendChild(card);
  });

  shuffle(formteile).forEach(f => {
    const zone = document.createElement('div');
    zone.className = 'zone ' + f.css;
    zone.dataset.formteil = f.id;
    zone.innerHTML = '<div class="zone-title">' + f.name + '</div><div class="zone-items"></div>';
    zonesEl.appendChild(zone);
  });

  initDrag();
}

// Long-press drag system
function initDrag() {
  let dragCard = null;
  let ghost = null;
  let longPressTimer = null;
  let isDragging = false;
  let offsetX = 0, offsetY = 0;
  let startX = 0, startY = 0;

  const LONG_PRESS_MS = 300;
  const MOVE_THRESHOLD = 8;

  document.addEventListener('touchstart', onTouchStart, { passive: false });
  document.addEventListener('touchmove', onTouchMove, { passive: false });
  document.addEventListener('touchend', onTouchEnd, { passive: false });

  // Mouse support
  document.addEventListener('mousedown', onMouseDown);
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);

  function onTouchStart(e) {
    const card = e.target.closest('.card');
    if (!card) return;

    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;

    longPressTimer = setTimeout(() => {
      startDrag(card, startX, startY);
      if (navigator.vibrate) navigator.vibrate(30);
    }, LONG_PRESS_MS);
  }

  function onTouchMove(e) {
    const x = e.touches[0].clientX;
    const y = e.touches[0].clientY;

    // Cancel long press if finger moves too much before activation
    if (!isDragging && longPressTimer) {
      if (Math.abs(x - startX) > MOVE_THRESHOLD || Math.abs(y - startY) > MOVE_THRESHOLD) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
        return; // Allow normal scrolling
      }
    }

    if (!isDragging) return;
    e.preventDefault();
    moveDrag(x, y);
  }

  function onTouchEnd(e) {
    clearTimeout(longPressTimer);
    longPressTimer = null;
    if (!isDragging) return;
    const t = e.changedTouches[0];
    endDrag(t.clientX, t.clientY);
  }

  function onMouseDown(e) {
    const card = e.target.closest('.card');
    if (!card) return;
    startDrag(card, e.clientX, e.clientY);
  }

  function onMouseMove(e) {
    if (!isDragging) return;
    moveDrag(e.clientX, e.clientY);
  }

  function onMouseUp(e) {
    if (!isDragging) return;
    endDrag(e.clientX, e.clientY);
  }

  function startDrag(card, x, y) {
    isDragging = true;
    dragCard = card;
    const rect = card.getBoundingClientRect();
    offsetX = x - rect.left;
    offsetY = y - rect.top;

    ghost = card.cloneNode(true);
    ghost.className = 'card drag-ghost';
    ghost.style.width = rect.width + 'px';
    ghost.style.left = (x - offsetX) + 'px';
    ghost.style.top = (y - offsetY) + 'px';
    document.body.appendChild(ghost);

    card.style.opacity = '0.25';
    card.classList.remove('correct', 'incorrect');
  }

  function moveDrag(x, y) {
    if (!ghost) return;
    ghost.style.left = (x - offsetX) + 'px';
    ghost.style.top = (y - offsetY) + 'px';

    // Auto-scroll when near edges
    const margin = 60;
    const speed = 8;
    if (y < margin) window.scrollBy(0, -speed);
    if (y > window.innerHeight - margin) window.scrollBy(0, speed);

    // Highlight drop zones
    document.querySelectorAll('.zone, .card-pool').forEach(z => {
      const r = z.getBoundingClientRect();
      z.classList.toggle('highlight', x >= r.left && x <= r.right && y >= r.top && y <= r.bottom);
    });
  }

  function endDrag(x, y) {
    if (!ghost || !dragCard) return;
    document.body.removeChild(ghost);
    ghost = null;
    dragCard.style.opacity = '1';

    // Find target
    let target = null;
    document.querySelectorAll('.zone').forEach(z => {
      const r = z.getBoundingClientRect();
      if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) {
        target = z.querySelector('.zone-items');
      }
      z.classList.remove('highlight');
    });

    const poolRect = poolEl.getBoundingClientRect();
    if (x >= poolRect.left && x <= poolRect.right && y >= poolRect.top && y <= poolRect.bottom) {
      target = poolEl;
    }
    poolEl.classList.remove('highlight');

    if (target) target.appendChild(dragCard);

    dragCard = null;
    isDragging = false;
  }
}

function checkAnswers() {
  let correct = 0;
  const total = merkmale.length;

  document.querySelectorAll('.card').forEach(card => {
    const answer = card.dataset.answer;
    const parent = card.closest('.zone');
    card.classList.remove('correct', 'incorrect');

    if (!parent) {
      card.classList.add('incorrect');
    } else if (parent.dataset.formteil === answer) {
      card.classList.add('correct');
      correct++;
    } else {
      card.classList.add('incorrect');
    }
  });

  const scoreEl = document.getElementById('score');
  const pct = Math.round(correct / total * 100);
  scoreEl.textContent = correct + ' von ' + total + ' richtig (' + pct + '%)';

  if (pct >= 90) { scoreEl.className = 'score good'; scoreEl.textContent += ' 🎉 Super!'; }
  else if (pct >= 60) { scoreEl.className = 'score partial'; scoreEl.textContent += ' – Fast!'; }
  else { scoreEl.className = 'score bad'; scoreEl.textContent += ' – Nochmal!'; }
}

function resetAll() { buildUI(); }
buildUI();
</script>
</body>
</html>
